{% extends "base.html" %}
{% block title %}Registro — BookStore{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="card">
        <div class="card-body">
            <h1>Crear Cuenta</h1>
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label for="username">Nombre de usuario</label>
                    <input type="text" id="username" name="username" class="form-control" required minlength="3"
                        autofocus>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" class="form-control" required minlength="8">
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirmar contraseña</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Registrarse</button>
            </form>
            <p style="text-align:center; margin-top:var(--space-lg); color:var(--text-secondary);">
                ¿Ya tienes cuenta? <a href="{{ url_for('auth.login') }}">Inicia sesión</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
