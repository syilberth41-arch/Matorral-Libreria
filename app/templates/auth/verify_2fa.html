{% extends "base.html" %}
{% block title %}Verificación 2FA — BookStore{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="card">
        <div class="card-body">
            <h1>🔐 Verificación 2FA</h1>
            <p style="color:var(--text-secondary); text-align:center; margin-bottom:var(--space-xl);">
                Ingresa el código de 6 dígitos de tu aplicación autenticadora.
            </p>
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label for="token">Código TOTP</label>
                    <input type="text" id="token" name="token" class="form-control" maxlength="6" pattern="\d{6}"
                        required autofocus placeholder="000000"
                        style="text-align:center; font-size:1.5rem; letter-spacing:0.5rem;">
                </div>
                <button type="submit" class="btn btn-primary btn-block">Verificar</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
